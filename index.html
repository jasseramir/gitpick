<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitPick | Discover Your Next Project</title>

  <!-- Icons -->
  <link rel="apple-touch-icon" sizes="180x180" href="assets/images/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="assets/images/android-chrome-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="assets/images/android-chrome-512x512.png">
  <link rel="icon" type="image/x-icon" href="assets/images/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/images/favicon-16x16.png">

  <!-- SEO -->
  <meta name="description" content="Find the coolest open-source projects on GitHub instantly. Pick a language and let the magic happen!">

  <!-- Open Graph (WhatsApp / Facebook) -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://jasseramir.github.io/gitpick/">
  <meta property="og:title" content="GitPick | Discover Your Next Project">
  <meta property="og:description" content="Find the coolest open-source projects on GitHub instantly.">
  <meta property="og:image" content="https://jasseramir.github.io/gitpick/assets/images/preview.png">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="GitPick | Discover Your Next Project">
  <meta name="twitter:description" content="Find the coolest open-source projects on GitHub instantly.">
  <meta name="twitter:image" content="https://jasseramir.github.io/gitpick/assets/images/preview.png">

  <!-- Styles -->
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles/base.css">
  <link rel="stylesheet" href="assets/styles/select.css">
  <link rel="stylesheet" href="assets/styles/card.css">
  <link rel="stylesheet" href="assets/styles/buttons.css">
  <link rel="stylesheet" href="assets/styles/responsive.css">
</head>
<body>
  <main class="container">
    <!-- Headers -->
    <h1 class="title"><span>Git</span>Pick</h1>
    <h2 class="subtitle">The smartest way to discover your next open-source project idea from GitHub.</h2>
    
    <!-- Select List -->
    <div class="select-list-container">
      <select class="select-list" id="langList">
        <!-- "%2B" means +, "%23" means # -->
        <option value="" selected disabled>Select a language</option>
        
        <option value="javascript">JavaScript</option>
        <option value="typescript">TypeScript</option>
        <option value="python">Python</option>
        <option value="java">Java</option>
        <option value="c">C Language</option>
        
        <option value="c++">C++</option>
        <option value="c#">C#</option>
        <option value="go">Go</option>
        <option value="rust">Rust</option>
        <option value="php">PHP</option>
        
        <option value="swift">Swift</option>
        <option value="kotlin">Kotlin</option>
        <option value="ruby">Ruby</option>
        <option value="dart">Dart</option>
        <option value="scala">Scala</option>
        
        <option value="shell">Shell</option>
        <option value="html">HTML</option>
        <option value="css">CSS</option>
        <option value="objective-c">Objective-C</option>
        <option value="objective-c++">Objective-C++</option>
        
        <option value="r">R</option>
        <option value="matlab">MATLAB</option>
        <option value="groovy">Groovy</option>
        <option value="powershell">PowerShell</option>
        <option value="elixir">Elixir</option>
        
        <option value="clojure">Clojure</option>
        <option value="haskell">Haskell</option>
        <option value="lua">Lua</option>
        <option value="perl">Perl</option>
        <option value="assembly">Assembly (ASM)</option>
        
        <option value="sql">SQL</option>
      </select>

      <i class="ri-arrow-down-s-line"></i>
    </div>
    
    <!-- Output -->
    <div id="viewCard"></div>
    
    <!-- Search And Refresh Buttons -->
    <button class="btn" id="searchBtn"></button>
  </main>
  
  <!-- Scripts -->
  <script src="assets/scripts/main.js" type="module"></script>
</body>
</html>
