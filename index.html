<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitPick | Discover Your Next Project</title>
  
  <link rel="apple-touch-icon" sizes="180x180" href="assets/images/apple-touch-icon.png">

  <link rel="icon" type="image/png" sizes="192x192" href="assets/images/android-chrome-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="assets/images/android-chrome-512x512.png">
  
  <link rel="icon" type="image/x-icon" href="assets/images/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/images/favicon-16x16.png">
  
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://jasseramir.github.io/gitpick/">
  <meta property="og:title" content="GitPick | Discover Your Next Project">
  <meta property="og:description" content="Find the coolest open-source projects on GitHub instantly.">
  <meta property="og:image" content="assets/images/android-chrome-512x512.png">
  <meta property="og:image" content="assets/images/preview.png">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="assets/images/android-chrome-512x512.png">
  <meta name="twitter:image" content="assets/images/preview.png">

  
  <meta name="description" content="Find the coolest open-source projects on GitHub instantly. Pick a language and let the magic happen!">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles/styles.css">
</head>
<body>
  <main class="container">
    <h1 class="title"><span>Git</span>Pick</h1>
    <h2 class="subtitle">The smartest way to discover your next open-source project idea from GitHub.</h2>
    <div class="select-list-container">
      <select class="select-list" id="langList">
        <option value="" selected disabled>Select a language</option>
        <option value="javascript">JavaScript</option>
        <option value="typescript">TypeScript</option> <option value="python">Python</option>
        <option value="java">Java</option> <option value="c">C Language</option>
        <option value="cpp">C++</option>
        <option value="csharp">C#</option>
        <option value="go">Go</option>
        <option value="rust">Rust</option>
        <option value="php">PHP</option>
        <option value="swift">Swift</option>
        <option value="kotlin">Kotlin</option>
      </select>

      <i class="ri-arrow-down-s-line"></i>
    </div>
    
    <div id="viewCard"></div>
    
    <button class="btn" id="searchBtn"></button>
  </main>
  
  <script src="assets/scripts/script.js"></script>
</body>
</html>
